<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Techweek</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inscricao.css') }}">
</head>

<body>

    <nav class="navbar">
        <img src="{{ url_for('static', filename='img/logo-unicesumar.png') }}" width="140" alt="UniCesumar">   
        <span class="nome-evento">WeekTech, 1ª Edição</span>
        <a href="{{ url_for('index') }}" class="btn-voltar" aria-label="Voltar para a página inicial">
            Retornar
        </a>
    </nav>

    <header class="titulo-pagina">
        <h1>Formulário de<br><em style="font-style:italic; color:#00c8ff;">Inscrição</em></h1>
        <p>Preencha os campos abaixo para garantir sua vaga</p>
    </header>

    <div class="formulario">
        <form action="/inscricao" method="POST">

            <div class="tipo-usuario">
                <label for="tipo-aluno">
                    <input type="radio" id="tipo-aluno" name="tipo" value="aluno" checked
                        onclick="alternarFormulario()">
                    SOU ALUNO
                </label>

                <label for="tipo-palestrante">
                    <input type="radio" id="tipo-palestrante" name="tipo" value="palestrante"
                        onclick="alternarFormulario()">
                    SOU PALESTRANTE
                </label>
            </div>

            <label>Nome Completo:</label>
            <input type="text" name="nome" required>

            <label>WhatsApp:</label>
            <input type="text" name="whatsapp">

            <div id="secao-aluno">

                <label>RA:</label>
                <input type="text" name="ra">

                <div class="campo-toggle">
                    <label class="switch-container">
                        <input type="checkbox" id="toggle-cafe" name="cafe" value="Sim">
                        <span class="texto-checkbox">Participará do café?</span>
                    </label>
                </div>

                <label for="cursos">Escolha seu curso e série:</label>
                <select id="cursos" name="curso_serie">
                    <option value="ads1">ADS - 1º Semestre</option>
                    <option value="ads3">ADS - 3º Semestre</option>
                    <option value="esoft1">ESOFT - 1º Semestre</option>
                    <option value="esoft3">ESOFT - 3º Semestre</option>
                    <option value="esoft5">ESOFT - 5º Semestre</option>
                </select>

                <div class="campo-toggle">
                    <label class="switch-container">
                        <input type="checkbox" id="toggle-projeto" onclick="alternarProjeto()">
                        <span class="texto-checkbox">APRESENTARÁ PROJETO?</span>
                    </label>
                </div>

                <div id="secao-projeto" style="display: none; margin-top: 15px;">
                    <label>NOME DO PROJETO:</label>
                    <input type="text" name="nome_projeto" placeholder="Ex: App de Gestão">

                    <label style="margin-top: 10px;">DESCRIÇÃO DO PROJETO:</label>
                    <textarea name="desc_projeto" rows="3"
                        style="width: 100%; border-radius: 8px; padding: 8px; border: 1.5px solid #b8d8ed; background-color: #ffffff;"></textarea>
                </div>

            </div>

            <div id="secao-palestrante" style="display: none;">

                <label>E-MAIL PARA CONTATO:</label>
                <input type="email" name="email_palestrante" placeholder="exemplo@email.com">

                <label style="margin-top: 15px;">CURRÍCULO RESUMIDO / BIO:</label>
                <textarea name="bio" rows="3"
                    placeholder="Conte um pouco sobre sua experiência profissional..."></textarea>

                <label>Título da Palestra:</label>
                <input type="text" name="titulo_palestra">

                <label style="margin-top: 15px;">DESCRIÇÃO DA PALESTRA / CONTEÚDO:</label>
                <textarea name="oq_sera_apresentado" rows="4"
                    placeholder="Descreva brevemente os tópicos que serão abordados..."></textarea>

                <label style="margin-top: 15px;">TEMPO DE DURAÇÃO (MÁX. 60 MIN):</label>
                <input type="text" name="tempo_palestra" placeholder="Ex: 50 minutos" maxlength="20">

            </div>

            <button type="submit" class="btn-cadastrar">Finalizar Inscrição</button>
        </form>
    </div>

    <script>
        function alternarFormulario() {
            const isAluno = document.getElementById('tipo-aluno').checked;
            const secaoAluno = document.getElementById('secao-aluno');
            const secaoPalestrante = document.getElementById('secao-palestrante');

            if (isAluno) {
                secaoAluno.style.display = 'block';
                secaoPalestrante.style.display = 'none';
            } else {
                secaoAluno.style.display = 'none';
                secaoPalestrante.style.display = 'block';
            }
        }

        function alternarProjeto() {
            const checkBox = document.getElementById("toggle-projeto");
            const secaoProjeto = document.getElementById("secao-projeto");

            if (checkBox.checked == true) {
                secaoProjeto.style.display = "block";
            } else {
                secaoProjeto.style.display = "none";
            }
        }
    </script>

</body>

</html>
