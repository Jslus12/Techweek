<!DOCTYPE html>
<html lang='en'>
<head>

    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Inscrição</title>
    <link rel='stylesheet' href="{{ url_for('static', filename='inscricao.css') }}">
</head>
<body>
    <nav class="navbar">
        <span class="logo">UniCesumar</span>
        <span class="nome-evento">WeekTech, 1ª Edição</span>
        <a href="{{ url_for('index') }}" class="btn-voltar" aria-label="Voltar para a página inicial">Voltar</a>
    </nav>

    <form>
    <label>Nome:</label><br>

    <input type="checkbox" name="nao"> nao <br><br>

    <input type="radio" name="genero" value="F"> Fem <br><br>

    <button type="submit">Cadastrar</button>
</form>
</body>
</html>
