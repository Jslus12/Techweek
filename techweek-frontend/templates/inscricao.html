<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Techweek</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inscricao.css') }}">
</head>

<body>

    <nav class="navbar">
        <span class="logo">UniCesumar</span>
        <span class="nome-evento">WeekTech, 1ª Edição</span>
        <a href="{{ url_for('index') }}" class="btn-voltar" aria-label="Voltar para a página inicial">
            Voltar
        </a>
    </nav>

    <header class="titulo-pagina">
        <h1>INSCRIÇÃO</h1>
        <p>Preencha os campos abaixo</p>
    </header>

    <div class="formulario">
        <form action="/inscricao" method="POST">
            
            <div class="tipo-usuario">
                <label for="tipo-aluno">
                    <input type="radio" id="tipo-aluno" name="tipo" value="aluno" checked onclick="alternarFormulario()"> 
                    SOU ALUNO
                </label>
                
                <label for="tipo-palestrante">
                    <input type="radio" id="tipo-palestrante" name="tipo" value="palestrante" onclick="alternarFormulario()"> 
                    SOU PALESTRANTE
                </label>
            </div>

            <label>Nome Completo:</label>
            <input type="text" name="nome" required> 

            <label>WhatsApp:</label>
            <input type="text" name="whatsapp">

            <div id="secao-aluno">
                <br>
                <label>RA:</label><br>
                <input type="text" name="ra"><br><br>

                <label>Quero participar do café:</label>
                <input type="checkbox" name="cafe" value="Sim"><br><br>

                <label for="cursos">Escolha seu curso e série:</label>
                <select id="cursos" name="curso_serie">
                    <option value="ads1">ADS - 1º Semestre</option>
                    <option value="ads3">ADS - 3º Semestre</option>
                    <option value="esoft1">ESOFT - 1º Semestre</option>
                    <option value="esoft3">ESOFT - 3º Semestre</option>
                    <option value="esoft5">ESOFT - 5º Semestre</option>
                </select>
            </div>

            <div id="secao-palestrante" style="display: none;">
                <br>
                <label>Título da Palestra:</label><br>
                <input type="text" name="titulo_palestra"><br><br>
                
                <label>Currículo Resumido:</label><br>
                <textarea name="bio" rows="4" style="width: 100%"></textarea>
            </div>

            <br><br>
            <button type="submit" class="btn-cadastrar">Finalizar Inscrição</button>
        </form>
    </div>

    <script>
        function alternarFormulario() {
            const isAluno = document.getElementById('tipo-aluno').checked;
            const secaoAluno = document.getElementById('secao-aluno');
            const secaoPalestrante = document.getElementById('secao-palestrante');

            if (isAluno) {
                secaoAluno.style.display = 'block';
                secaoPalestrante.style.display = 'none';
            } else {
                secaoAluno.style.display = 'none';
                secaoPalestrante.style.display = 'block';
            }
        }
    </script>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="{{ url_for('static', filename='fundo-inscricao.mp4') }}" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById("bg-video");
        video.playbackRate = 1; 
    </script>

</body>
</html>
