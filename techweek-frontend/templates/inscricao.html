<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Techweek</title>
    <!-- O Flask busca o CSS na pasta static -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inscricao.css') }}">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="btn-voltar">← Voltar</a>
        <div class="logo">Techweek 2026</div>
    </nav>

     <header class="titulo-pagina">
        <h1>INSCRIÇÃO</h1>
        <p>Preencha os campos abaixo</p>
    </header>


    <div class="formulario">

        <form>
            <label>Nome:</label><br>
            <input type="text" name="nome"><br><br>

            <label>RA:</label><br>
            <input type="text" name="ra"><br><br>

            <label>Quero participar no café:</label><input type="checkbox" name="sim"><br><br>

            <label for="cidades">Escolha seu curso e serie:</label>
            <select id="cidades" name="cidades">
                <option value="ads1">ADS - 1º Semestre</option>
                <option value="ads3">ADS - 3º Semestre</option>
                <option value="eng1">ESOFT - 1º Semestre</option>
                <option value="eng3">ESOFT - 3º Semestre</option>
                <option value="eng5">ESOFT - 5º Semestre</option>

            </select>

            <button type="submit">Cadastrar</button>
        </form>
    </div>



</body>

</html>
