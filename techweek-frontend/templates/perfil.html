<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWeek | Perfil de {{ palestrante.nome }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='perfil.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body class="tech-page">

    <div class="stars-overlay"></div>

    <nav class="vantage-navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <span class="brand-unicesumar">UniCesumar</span> | WeekTech, 1ª Edição
                </a>
            </div>
            <div class="nav-links">
                <a href="/devs" class="nav-item">Desenvolvedores</a>
                <a href="/palestrantes" class="nav-item">Palestrantes</a>
                <a href="/ajuda" class="nav-item">Ajuda</a>
                <a href="javascript:history.back()" class="nav-btn-retornar">
                    <span>←</span> Retornar
                </a>
            </div>
        </div>
    </nav>

    <main class="perfil-container">
        
        <header class="perfil-header">
            <span class="perfil-tag">{{ palestrante.trilha }}</span>
            <h1 class="perfil-title">{{ palestrante.nome }}<span>.</span></h1>
            <p class="perfil-subtitle">{{ palestrante.sub_titulo }}</p>
        </header>

        <section class="perfil-content">
            
            <div class="perfil-sidebar">
                <img src="{{ url_for('static', filename='Img/' + palestrante.imagem) }}" alt="{{ palestrante.nome }}" class="perfil-img">
            </div>

            <article class="perfil-bio">
                <h2 class="section-title">SOBRE O PALESTRANTE</h2>
                <div class="bio-text">
                    {{ palestrante.descricao_completa | safe }}
                </div>
            </article>

        </section>

    </main>

</body>
</html>
